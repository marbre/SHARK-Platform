version: "2"

build:
  os: "ubuntu-24.04"
  tools:
    python: "3.12"
  apt_packages:
    - clang
    - lld
    - cmake
    - ninja-build
  jobs:
    pre_build:
      - mkdir build
      - cmake -GNinja -Slibshortfin -Blibshortfin/build -DCMAKE_C_COMPILER=clang-18 -DCMAKE_CXX_COMPILER=clang++-18 -DCMAKE_LINKER_TYPE=LLD -DSHORTFIN_BUNDLE_DEPS=ON -DSHORTFIN_BUILD_PYTHON_BINDINGS=ON
      - cmake --build libshortfin/build --target all

python:
  install:
    - requirements: libshortfin/docs/requirements.txt

sphinx:
  configuration: libshortfin/docs/conf.py
